# ===========================================================================
# AI Code Review Pipeline Template
# ===========================================================================
# Add this step to your PR-triggered pipeline to enable AI code reviews.
#
# Prerequisites:
#   1. Deploy the AiCodeReview API service
#   2. Set the CODE_REVIEW_API_URL variable (pipeline variable or variable group)
#   3. For Bash options: jq must be available on the build agent (ubuntu-latest includes it)
#
# This template uses built-in Azure DevOps variables so it works across
# any project and repository with zero per-repo configuration.
# ===========================================================================

# Example: Full PR pipeline with AI code review
# Uncomment and customize for your team's needs.

# trigger: none    # Only run on PRs, not pushes
#
# pr:
#   branches:
#     include:
#       - main
#       - develop
#       - release/*

# variables:
#   CODE_REVIEW_API_URL: 'https://your-ai-code-review-service.azurewebsites.net'

# pool:
#   vmImage: 'ubuntu-latest'

steps:
  # ---------------------------------------------------------------------------
  # Option A (recommended): Bash inline script
  # ---------------------------------------------------------------------------
  - task: Bash@3
    displayName: 'AI Code Review'
    condition: eq(variables['Build.Reason'], 'PullRequest')
    inputs:
      targetType: inline
      script: |
        set -euo pipefail
        REVIEW_STRATEGY="${REVIEW_STRATEGY:-FileByFile}"

        echo "##vso[task.setprogress value=5]Submitting AI code review..."
        echo "Requesting review for PR #$(System.PullRequest.PullRequestId)..."

        BODY=$(cat <<EOF
        {
            "projectName": "$(System.TeamProject)",
            "repositoryName": "$(Build.Repository.Name)",
            "pullRequestId": $(System.PullRequest.PullRequestId),
            "reviewStrategy": "${REVIEW_STRATEGY}"
        }
        EOF
        )

        RESPONSE=$(curl -s -S --fail \
            --max-time 600 \
            -H "Content-Type: application/json" \
            -d "${BODY}" \
            "$(CODE_REVIEW_API_URL)/api/review") || {
            echo "##vso[task.logissue type=warning]AI Code Review unavailable: ${RESPONSE}"
            exit 0
        }

        STATUS=$(echo "${RESPONSE}" | jq -r '.status // "unknown"')
        RECOMMENDATION=$(echo "${RESPONSE}" | jq -r '.recommendation // "unknown"')
        ISSUE_COUNT=$(echo "${RESPONSE}" | jq -r '.issueCount // 0')
        ERROR_COUNT=$(echo "${RESPONSE}" | jq -r '.errorCount // 0')
        WARNING_COUNT=$(echo "${RESPONSE}" | jq -r '.warningCount // 0')
        INFO_COUNT=$(echo "${RESPONSE}" | jq -r '.infoCount // 0')

        echo "##vso[task.setprogress value=100]Review complete"
        echo ""
        echo "Status:  ${STATUS}"
        echo "Verdict: ${RECOMMENDATION}"
        echo "Issues:  ${ISSUE_COUNT} (E:${ERROR_COUNT} W:${WARNING_COUNT} I:${INFO_COUNT})"

        echo "##vso[task.setvariable variable=AI_REVIEW_STATUS]${STATUS}"
        echo "##vso[task.setvariable variable=AI_REVIEW_RECOMMENDATION]${RECOMMENDATION}"

        case "${RECOMMENDATION}" in
            Rejected)
                echo "##vso[task.logissue type=error]AI Code Review: REJECTED"
                echo "##vso[task.complete result=Failed;]AI Code Review REJECTED"
                ;;
            NeedsWork)
                echo "##vso[task.logissue type=warning]AI Code Review: NEEDS WORK"
                ;;
        esac

  # ---------------------------------------------------------------------------
  # Option B: External bash script file (if checked into the repo)
  # ---------------------------------------------------------------------------
  # - task: Bash@3
  #   displayName: 'AI Code Review'
  #   condition: eq(variables['Build.Reason'], 'PullRequest')
  #   env:
  #     API_URL: $(CODE_REVIEW_API_URL)
  #     PROJECT_NAME: $(System.TeamProject)
  #     REPOSITORY_NAME: $(Build.Repository.Name)
  #     PULL_REQUEST_ID: $(System.PullRequest.PullRequestId)
  #   inputs:
  #     targetType: filePath
  #     filePath: '$(Build.SourcesDirectory)/scripts/ai-code-review.sh'
